name: Release

on:
    push:
        branches:
            - main
            - rc

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    release:
        name: semantic-release
        runs-on: ubuntu-latest
        outputs:
            published: ${{ steps.semrel.outputs.new_release_published }}
            version: ${{ steps.semrel.outputs.new_release_version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run semantic-release
              id: semrel
              uses: cycjimmy/semantic-release-action@v4
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build-windows:
        name: Build Windows installers
        needs: release
        if: needs.release.outputs.published == 'true'
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: v${{ needs.release.outputs.version }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Get release ID
              id: gh_release
              shell: bash
              run: |
                  tag="v${VERSION}"
                  id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)
                  prerelease=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .prerelease)
                  echo "id=$id" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
                  # WiX/MSI only supports numeric pre-release segments (e.g. 1.0.0-1), not 1.0.0-rc.1
                  if [ "$prerelease" = "true" ]; then
                    echo "bundles=nsis" >> "$GITHUB_OUTPUT"
                  else
                    echo "bundles=msi,nsis" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.release.outputs.version }}

            - name: Build and upload installers
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: src-tauri
                  tauriScript: bun run tauri
                  releaseId: ${{ steps.gh_release.outputs.id }}
                  tagName: v${{ needs.release.outputs.version }}
                  releaseDraft: false
                  prerelease: ${{ steps.gh_release.outputs.prerelease == 'true' }}
                  args: --bundles ${{ steps.gh_release.outputs.bundles }}

            - name: Ensure RC updater channel release exists
              if: steps.gh_release.outputs.prerelease == 'true'
              shell: bash
              run: |
                  gh release view updater-rc --repo "${GITHUB_REPOSITORY}" 2>/dev/null || \
                    gh release create updater-rc --repo "${GITHUB_REPOSITORY}" \
                      --title "Updater channel (RC)" \
                      --notes "Rolling update manifest for pre-release builds. Install Scrivon from the latest rc GitHub Release instead." \
                      --prerelease

            - name: Publish RC updater manifest
              if: steps.gh_release.outputs.prerelease == 'true'
              shell: bash
              run: |
                  gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" --pattern 'latest.json' --dir ./updater-tmp
                  cp ./updater-tmp/latest.json ./updater-tmp/latest-rc.json
                  gh release upload updater-rc ./updater-tmp/latest-rc.json --repo "${GITHUB_REPOSITORY}" --clobber
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: v${{ needs.release.outputs.version }}
