# Manual re-run for releases that were published before the Windows build job existed,
# or when you need to rebuild installers without a new version bump.
name: Build release artifacts (manual)

on:
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag to build (e.g. v1.0.0)'
                required: true
                type: string

permissions:
    contents: write

jobs:
    build-windows:
        name: Build Windows installers
        runs-on: windows-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri -> target

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Get release ID
              id: gh_release
              shell: bash
              run: |
                  id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq .id)
                  prerelease=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq .prerelease)
                  echo "id=$id" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
                  if [ "$prerelease" = "true" ]; then
                    echo "bundles=nsis" >> "$GITHUB_OUTPUT"
                  else
                    echo "bundles=msi,nsis" >> "$GITHUB_OUTPUT"
                  fi
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ inputs.tag }}

            - name: Build and upload installers
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  projectPath: src-tauri
                  tauriScript: bun run tauri
                  releaseId: ${{ steps.gh_release.outputs.id }}
                  tagName: ${{ inputs.tag }}
                  releaseDraft: false
                  prerelease: ${{ steps.gh_release.outputs.prerelease == 'true' }}
                  args: --bundles ${{ steps.gh_release.outputs.bundles }}

            - name: Ensure RC updater channel release exists
              if: steps.gh_release.outputs.prerelease == 'true'
              shell: bash
              run: |
                  gh release view updater-rc --repo "${GITHUB_REPOSITORY}" 2>/dev/null || \
                    gh release create updater-rc --repo "${GITHUB_REPOSITORY}" \
                      --title "Updater channel (RC)" \
                      --notes "Rolling update manifest for pre-release builds." \
                      --prerelease

            - name: Publish RC updater manifest
              if: steps.gh_release.outputs.prerelease == 'true'
              shell: bash
              run: |
                  gh release download "${{ inputs.tag }}" --repo "${GITHUB_REPOSITORY}" --pattern 'latest.json' --dir ./updater-tmp
                  cp ./updater-tmp/latest.json ./updater-tmp/latest-rc.json
                  gh release upload updater-rc ./updater-tmp/latest-rc.json --repo "${GITHUB_REPOSITORY}" --clobber
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
