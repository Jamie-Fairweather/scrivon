appId: com.diagram.app
productName: Diagram App
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - .next/standalone/**/*
  - package.json
asar: true
# Local Windows builds: skip code signing so winCodeSign is not extracted
# (that archive contains symlinks and fails without Developer Mode / admin).
forceCodeSigning: false
win:
  signAndEditExecutable: false
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
